{% extends 'base.html' %}

{% block content %}
<style>
    .auth-card {
        max-width: 450px;
        margin: 50px auto;
        padding: 30px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
    }
    .auth-card h2 { color: #2c3e50; margin-bottom: 20px; }
    .auth-card p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; box-sizing: border-box; }
    .btn-primary { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: #2980b9; }
</style>

<div class="auth-card">
    <h2>Parolni tiklash 🔑</h2>
    <p>Emailingizni kiriting, biz sizga parolni o'zgartirish uchun maxsus link yuboramiz.</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Email manzilingiz:</label>
            {{ form.email }}
            {% if form.email.errors %}<div style="color: red; font-size: 12px;">{{ form.email.errors }}</div>{% endif %}
        </div>
        <button type="submit" class="btn-primary">Linkni yuborish</button>
    </form>
</div>
{% endblock %}
